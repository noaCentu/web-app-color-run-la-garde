<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Staff Color Run</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=60">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        .page-content { width: 90%; max-width: 400px; margin: 0 auto 20px; padding: 35px 25px; background: var(--glass-bg); backdrop-filter: blur(12px); border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 1px solid var(--glass-border); }
        #reader { width: 100%; margin: 0 auto; border-radius: 15px; overflow: hidden; border: 4px solid var(--brand); background-color: black; }
        .btn-avis { background: #673AB7; color: white; border: none; padding: 12px; width: 100%; font-size: 14px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 10px rgba(103, 58, 183, 0.3); }
        .survey-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .survey-content { background: var(--modal-bg); color: var(--text-main); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid var(--glass-border); }
        .survey-q { margin-bottom: 15px; text-align: left; }
        .survey-q p { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .stars { display: flex; gap: 5px; justify-content: center; margin-bottom: 10px; }
        .stars span { font-size: 35px; color: #888888; cursor: pointer; transition: 0.2s; }
        .stars span.active { color: var(--brand); }
        .btn-submit-survey { background: var(--brand); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; margin-bottom: 10px;}
        body { top: 0 !important; }
    </style>
</head>
<body>
    <div class="fullscreen-bg"></div>

    <div class="header-v2">
        <div class="header-title"><span class="notranslate">Scanner</span> <span style="color:white;">Staff</span></div>
    </div>

    <div class="page-content" style="margin-top: 20px;">
        <h2 style="margin-bottom: 5px;">Validation Rapide</h2>
        <p style="font-size: 13px; margin-bottom: 20px;">Pointez vers le QR Code.</p>
        
        <div id="reader"></div>
        <div id="scan-result" style="margin-top: 20px; font-weight: 800; font-size: 18px; padding: 20px; border-radius: 15px; display: none;"></div>

        <button id="btn-open-survey" class="btn-avis" onclick="document.getElementById('admin-survey').style.display='flex'">📝 Donner mon avis sur l'application</button>
        <button class="btn-outline" onclick="logout()" style="margin-top: 20px;">Se déconnecter</button>
    </div>

    <div class="survey-modal" id="admin-survey">
        <div class="survey-content">
            <h3 style="margin-bottom: 15px; text-align: center; color: var(--brand);">Feedback Animateurs</h3>
            <div class="survey-q"><p>1. Facilité d'utilisation du scanner ?</p><div class="stars" id="sq1"><span onclick="rate('sq1', 1)">★</span><span onclick="rate('sq1', 2)">★</span><span onclick="rate('sq1', 3)">★</span><span onclick="rate('sq1', 4)">★</span><span onclick="rate('sq1', 5)">★</span></div></div>
            <div class="survey-q"><p>2. Stabilité et rapidité de l'application ?</p><div class="stars" id="sq2"><span onclick="rate('sq2', 1)">★</span><span onclick="rate('sq2', 2)">★</span><span onclick="rate('sq2', 3)">★</span><span onclick="rate('sq2', 4)">★</span><span onclick="rate('sq2', 5)">★</span></div></div>
            <div class="survey-q" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;"><p style="color: var(--brand);">3. (Optionnel)</p><p style="font-size: 12px; margin-bottom: 5px;">Avantage par rapport au papier ?</p><div class="stars" id="sq3"><span onclick="rate('sq3', 1)">★</span><span onclick="rate('sq3', 2)">★</span><span onclick="rate('sq3', 3)">★</span><span onclick="rate('sq3', 4)">★</span><span onclick="rate('sq3', 5)">★</span></div></div>
            <textarea id="s-comment" rows="3" placeholder="Une idée, un bug, une suggestion ?"></textarea>
            <button class="btn-submit-survey" onclick="submitAdminSurvey()">Envoyer mon avis</button>
            <button class="btn-outline" onclick="document.getElementById('admin-survey').style.display='none'">Fermer</button>
        </div>
    </div>

    <script src="script.js?v=60"></script>
    <script>
        const token = sessionStorage.getItem('centurioAdminToken');
        if (!token) window.location.href = "index.html"; 

        if (localStorage.getItem('centurioAdminSurveyDone')) {
            document.getElementById('btn-open-survey').style.display = 'none';
        }

        const html5QrCode = new Html5Qrcode("reader");
        let isProcessing = false; 

        function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true;
            document.getElementById('reader').style.borderColor = "var(--brand)";

            try {
                const url = new URL(decodedText);
                const userId = url.searchParams.get('user');
                const gameId = url.searchParams.get('game');

                if (userId && gameId) {
                    fetch('/api/validate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: userId, gameId: gameId, token: token }) })
                    .then(res => res.json())
                    .then(data => {
                        const rDiv = document.getElementById('scan-result');
                        rDiv.style.display = 'block';
                        if(data.success) {
                            rDiv.style.backgroundColor = 'rgba(57, 255, 20, 0.2)'; rDiv.style.color = '#39FF14'; rDiv.innerText = "✅ VALIDÉ !";
                            document.getElementById('reader').style.borderColor = "#39FF14";
                        } else {
                            rDiv.style.backgroundColor = 'rgba(255, 0, 0, 0.2)'; rDiv.style.color = '#ff4d4d'; rDiv.innerText = "❌ ERREUR : " + data.message;
                            document.getElementById('reader').style.borderColor = "red";
                        }
                        setTimeout(() => { rDiv.style.display = 'none'; document.getElementById('reader').style.borderColor = "var(--brand)"; isProcessing = false; }, 2500);
                    }).catch(err => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--brand)"; });
                } else {
                    setTimeout(() => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--brand)"; }, 1500);
                }
            } catch(e) {
                setTimeout(() => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--brand)"; }, 1500);
            }
        }

        const cameraConfig = { fps: 30, disableFlip: false };
        
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length > 0) {
                let cameraId = devices[0].id;
                html5QrCode.start({ facingMode: "environment" }, cameraConfig, onScanSuccess, () => {})
                .catch(() => {
                    html5QrCode.start(cameraId, cameraConfig, onScanSuccess, () => {})
                    .catch(err => alert("🚨 Échec : Autorisez la caméra."));
                });
            }
        });

        function logout() { sessionStorage.removeItem('centurioAdminToken'); window.location.href = "index.html"; }

        let scores = { sq1: 0, sq2: 0, sq3: 0 };
        function rate(qId, val) {
            scores[qId] = val;
            let spans = document.getElementById(qId).getElementsByTagName('span');
            for(let i=0; i<5; i++) { spans[i].className = i < val ? 'active' : ''; }
        }

        function submitAdminSurvey() {
            if(scores.sq1 === 0 || scores.sq2 === 0) return alert("Veuillez noter les questions 1 et 2 !");
            fetch('/api/admin_survey', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ q1: scores.sq1, q2: scores.sq2, q3: scores.sq3, comment: document.getElementById('s-comment').value, token: token })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    localStorage.setItem('centurioAdminSurveyDone', 'true');
                    document.getElementById('admin-survey').style.display = 'none';
                    document.getElementById('btn-open-survey').style.display = 'none';
                    alert("Merci pour votre retour !");
                }
            });
        }
    </script>
</body>
</html>
