<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Staff Color Run</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=70">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="fullscreen-bg"></div>

    <div class="header-v2">
        <div style="width:30px;"></div> <div class="header-title"><span class="notranslate">Scanner</span> <span style="color:white;">Staff</span></div>
        <div class="hamburger-btn" id="admin-menu-btn" onclick="toggleMenu()" style="display:none; font-size:25px;">☰</div>
    </div>

    <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <button class="close-menu" onclick="toggleMenu()">×</button>
        <a href="scan.html" style="color: var(--brand) !important;">📷 Scanner QR Code</a>
        <a href="stats.html">📊 Statistiques</a>
        <a href="tirage.html">🎰 Tirage au sort</a>
    </div>

    <div class="page-content" style="margin-top: 20px;">
        <h2 style="margin-bottom: 5px;">Validation Rapide</h2>
        <p style="font-size: 13px; margin-bottom: 20px;">Pointez vers le QR Code du joueur.</p>
        
        <div id="reader"></div>
        <div id="scan-result" style="margin-top: 20px; font-weight: 800; font-size: 18px; padding: 20px; border-radius: 15px; display: none;"></div>

        <button id="btn-open-survey" class="btn-group-select" style="margin-top: 30px; background:var(--uv-blue); color:black;" onclick="document.getElementById('admin-survey').style.display='flex'">📝 Avis Animateur</button>
        <button class="btn-outline" onclick="logout()" style="margin-top: 20px;">Se déconnecter</button>
    </div>

    <div class="modal-overlay" id="admin-survey">
        <div class="modal fade-in">
            <h3 style="margin-bottom: 15px; text-align: center; color: var(--brand);">Feedback Animateurs</h3>
            <div class="survey-scale" id="sq1" style="flex-direction:column; align-items:center;">
                <p style="font-size:12px;">Facilité du scanner ?</p>
                <div style="display:flex; gap:5px;"><span onclick="rate('sq1', 1)">★</span><span onclick="rate('sq1', 2)">★</span><span onclick="rate('sq1', 3)">★</span><span onclick="rate('sq1', 4)">★</span><span onclick="rate('sq1', 5)">★</span></div>
            </div>
            <div class="survey-scale" id="sq2" style="flex-direction:column; align-items:center;">
                <p style="font-size:12px;">Rapidité de l'app ?</p>
                <div style="display:flex; gap:5px;"><span onclick="rate('sq2', 1)">★</span><span onclick="rate('sq2', 2)">★</span><span onclick="rate('sq2', 3)">★</span><span onclick="rate('sq2', 4)">★</span><span onclick="rate('sq2', 5)">★</span></div>
            </div>
            <button class="btn-group-select" onclick="submitAdminSurvey()">Envoyer</button>
            <button class="btn-outline" onclick="document.getElementById('admin-survey').style.display='none'">Fermer</button>
        </div>
    </div>

    <script>
        const token = sessionStorage.getItem('centurioAdminToken');
        if (!token) window.location.href = "index.html"; 

        // Si c'est le BIG BOSS (admin+), on affiche le menu caché !
        if (sessionStorage.getItem('centurioAdminRole') === 'admin+') {
            document.getElementById('admin-menu-btn').style.display = 'block';
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); document.getElementById('menu-overlay').classList.toggle('open'); }

        const html5QrCode = new Html5Qrcode("reader");
        let isProcessing = false; 

        function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true;
            document.getElementById('reader').style.borderColor = "var(--brand)";

            try {
                const url = new URL(decodedText);
                const userId = url.searchParams.get('user');
                const gameId = url.searchParams.get('game');

                if (userId && gameId) {
                    fetch('/api/validate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: userId, gameId: gameId, token: token }) })
                    .then(res => res.json())
                    .then(data => {
                        const rDiv = document.getElementById('scan-result');
                        rDiv.style.display = 'block';
                        if(data.success) {
                            rDiv.style.backgroundColor = 'rgba(57, 255, 20, 0.2)'; rDiv.style.color = '#39FF14'; rDiv.innerText = "✅ VALIDÉ !";
                            document.getElementById('reader').style.borderColor = "#39FF14";
                        } else {
                            rDiv.style.backgroundColor = 'rgba(255, 0, 0, 0.2)'; rDiv.style.color = '#ff4d4d'; rDiv.innerText = "❌ ERREUR : " + data.message;
                            document.getElementById('reader').style.borderColor = "red";
                        }
                        setTimeout(() => { rDiv.style.display = 'none'; document.getElementById('reader').style.borderColor = "var(--brand)"; isProcessing = false; }, 2500);
                    }).catch(err => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--brand)"; });
                } else {
                    setTimeout(() => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--brand)"; }, 1500);
                }
            } catch(e) {
                setTimeout(() => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--brand)"; }, 1500);
            }
        }

        const cameraConfig = { fps: 30, disableFlip: false };
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length > 0) {
                html5QrCode.start({ facingMode: "environment" }, cameraConfig, onScanSuccess, () => {}).catch(() => {
                    html5QrCode.start(devices[0].id, cameraConfig, onScanSuccess, () => {}).catch(err => alert("🚨 Échec caméra."));
                });
            }
        });

        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }

        let scores = { sq1: 0, sq2: 0 };
        function rate(qId, val) {
            scores[qId] = val;
            let spans = document.getElementById(qId).getElementsByTagName('span');
            for(let i=0; i<5; i++) spans[i].style.color = i < val ? 'var(--brand)' : '#888';
        }
        function submitAdminSurvey() {
            fetch('/api/admin_survey', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ q1: scores.sq1, q2: scores.sq2, q3: 5, comment: "", token: token }) })
            .then(res => res.json()).then(data => { document.getElementById('admin-survey').style.display='none'; alert("Merci !"); });
        }
    </script>
</body>
</html>
