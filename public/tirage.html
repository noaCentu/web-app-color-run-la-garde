<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tirage au Sort - Color Run</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=73">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; background-color: var(--bg-night); 
        }
        
        .header-v2 { position: absolute; top:0; width:100%; z-index: 1000; }

        /* Le conteneur de la Machine à Sous */
        .slot-machine-container {
            width: 90%; max-width: 800px;
            background: rgba(10, 0, 26, 0.9);
            border: 4px solid var(--brand);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.4), inset 0 0 30px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .slot-title { color: white; font-size: 28px; font-weight: 900; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }

        /* La fenêtre de la roulette */
        .roulette-window {
            position: relative;
            height: 120px; /* Hauteur d'un seul nom */
            overflow: hidden;
            background: #000;
            border-radius: 10px;
            border: 2px solid var(--neon-border);
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.8);
        }

        /* Le ruban qui défile */
        .roulette-strip {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            /* La transition sera gérée par le JS pour l'effet de freinage */
        }

        /* Chaque nom dans la roulette */
        .roulette-item {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: 900;
            color: #444; /* Gris par défaut pendant que ça tourne */
            text-transform: uppercase;
            width: 100%;
            white-space: nowrap;
        }

        /* Style spécifique pour le gagnant une fois arrêté */
        .roulette-item.winner-highlight {
            color: var(--success);
            text-shadow: 0 0 20px var(--success), 0 0 40px var(--success);
            transform: scale(1.1);
            transition: all 0.5s ease;
        }

        /* Le viseur (cadre central) */
        .roulette-selector {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-top: 3px solid var(--uv-blue);
            border-bottom: 3px solid var(--uv-blue);
            background: linear-gradient(to bottom, rgba(0,255,255,0.1), transparent 20%, transparent 80%, rgba(0,255,255,0.1));
            pointer-events: none; /* Pour ne pas bloquer l'animation en dessous */
            box-shadow: 0 0 15px var(--uv-blue);
        }

        /* Bouton Lancer */
        .btn-lancer {
            background: var(--uv-blue); color: black; font-size: 26px;
            padding: 20px 50px; border-radius: 50px; border: none;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 25px var(--uv-blue); transition: 0.3s; margin-top: 40px;
            animation: pulse-btn 2s infinite;
        }
        .btn-lancer:hover { transform: scale(1.05); box-shadow: 0 0 50px var(--uv-blue); background: #fff; }
        .btn-lancer:active { transform: scale(0.95); }
        
        @keyframes pulse-btn { 
            0% { box-shadow: 0 0 15px var(--uv-blue); } 
            50% { box-shadow: 0 0 35px var(--uv-blue); } 
            100% { box-shadow: 0 0 15px var(--uv-blue); } 
        }

        #empty-msg { color: #ff4d4d; font-weight: bold; font-size: 20px; display: none; margin-top: 20px; text-shadow: 0 0 10px red; }
    </style>
</head>
<body>
    <div class="fullscreen-bg"></div>

    <div class="header-v2">
        <div style="width:30px;"></div>
        <div class="header-title neon-text">TIRAGE AU SORT 🎰</div>
        <div class="hamburger-btn" id="admin-menu-btn" onclick="toggleMenu()" style="display:none; font-size:25px; cursor:pointer;">☰</div>
    </div>
    
    <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <button class="close-menu" onclick="toggleMenu()">×</button>
        <a href="scan.html">📷 Scanner QR Code</a>
        <a href="stats.html">📊 Statistiques</a>
        <a href="tirage.html" style="color: var(--brand) !important;">🎰 Tirage au sort</a>
        <div style="margin-top: auto; margin-bottom: 20px;">
            <a href="#" onclick="logout()" style="border-top: 1px solid var(--glass-border); border-bottom: none; font-size: 14px; margin-top: 20px; color: #ff4d4d !important;">🚪 Déconnexion</a>
        </div>
    </div>

    <div class="slot-machine-container">
        <div class="slot-title">LE GRAND GAGNANT EST...</div>
        
        <div class="roulette-window">
            <div class="roulette-strip" id="roulette-strip">
                <div class="roulette-item" style="color: white; text-shadow: 0 0 10px white;">PRÊT ?</div>
            </div>
            <div class="roulette-selector"></div>
        </div>

        <button class="btn-lancer" id="btn-action" onclick="lancerRoulette()">LANCER LA ROULETTE</button>
        <p id="empty-msg">🚨 Aucun participant inscrit pour le moment !</p>
    </div>

    <script>
        // Vérif Sécurité
        const token = sessionStorage.getItem('centurioStatsToken');
        if (!token) window.location.href = "index.html";
        if (sessionStorage.getItem('centurioAdminRole') === 'admin+') {
            document.getElementById('admin-menu-btn').style.display = 'block';
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); document.getElementById('menu-overlay').classList.toggle('open'); }
        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }

        function lancerRoulette() {
            const btn = document.getElementById('btn-action');
            const emptyMsg = document.getElementById('empty-msg');
            const strip = document.getElementById('roulette-strip');
            
            btn.style.display = 'none';
            strip.style.transition = 'none'; // On coupe la transition pour réinitialiser
            strip.style.transform = 'translateY(0)';
            strip.innerHTML = '<div class="roulette-item" style="color: white;">CHARGEMENT...</div>';

            // Requête au serveur pour tirer le VRAI gagnant 100% aléatoire
            fetch('/api/tirage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: token }) })
            .then(res => res.json())
            .then(data => {
                if (!data.success) {
                    btn.style.display = 'inline-block';
                    emptyMsg.style.display = 'block';
                    strip.innerHTML = '<div class="roulette-item" style="color: #ff4d4d;">ERREUR</div>';
                    setTimeout(() => emptyMsg.style.display = 'none', 3000);
                    return;
                }

                // 1. Préparation de la liste (50 faux noms + le vrai à la fin)
                const totalItems = 50;
                let htmlContent = '';
                
                // On remplit le ruban avec plein de faux noms pris au hasard
                for(let i = 0; i < totalItems - 1; i++) {
                    let randomName = data.fauxNoms[i % data.fauxNoms.length];
                    htmlContent += `<div class="roulette-item">${randomName}</div>`;
                }
                
                // On ajoute le VRAI gagnant tout à la fin
                const winnerFullName = `${data.winner.prenom} ${data.winner.nom}`;
                htmlContent += `<div class="roulette-item" id="winner-element">${winnerFullName}</div>`;
                // Et on ajoute 2 cases vides en dessous pour la marge visuelle
                htmlContent += `<div class="roulette-item"></div><div class="roulette-item"></div>`;
                
                strip.innerHTML = htmlContent;

                // 2. Lancement de l'animation de Roulette
                const itemHeight = 120; // Doit correspondre à la hauteur CSS (.roulette-item)
                const targetPosition = -((totalItems - 1) * itemHeight); // Position finale pour être pile sur le gagnant
                
                // Forcer le navigateur à actualiser le DOM avant d'animer
                void strip.offsetWidth; 

                // On applique une transition très fluide : rapide au début, puis freinage progressif (cubic-bezier) sur 6 secondes
                strip.style.transition = 'transform 6s cubic-bezier(0.15, 0.85, 0.15, 1)';
                strip.style.transform = `translateY(${targetPosition}px)`;

                // 3. À la fin de la rotation (6 secondes)
                setTimeout(() => {
                    // Mettre le gagnant en surbrillance
                    document.getElementById('winner-element').classList.add('winner-highlight');

                    // Poudre Fluo / Confettis !
                    const fluoColors = ['#FF007F', '#39FF14', '#00FFFF', '#FFFF00', '#FF00FF'];
                    confetti({ particleCount: 800, spread: 360, startVelocity: 70, scalar: 1.2, colors: fluoColors, zIndex: 9999, origin: { y: 0.6 } });
                    setTimeout(() => confetti({ particleCount: 400, spread: 360, startVelocity: 50, colors: fluoColors, zIndex: 9999, origin: { y: 0.6 } }), 500);

                    // Réafficher le bouton pour refaire un tirage
                    btn.innerText = "REFAIRE UN TIRAGE";
                    btn.style.display = 'inline-block';
                    btn.style.marginTop = '40px';

                }, 6000); // 6000ms = 6 secondes de suspense !
            });
        }
    </script>
</body>
</html>
