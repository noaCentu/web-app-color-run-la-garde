<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tirage au Sort - Color Run</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=75">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; background-color: var(--bg-night); 
        }
        
        .header-v2 { position: absolute; top:0; width:100%; z-index: 1000; background: rgba(10, 0, 26, 0.8) !important; backdrop-filter: blur(10px); border-bottom: 2px solid var(--brand); }

        .main-container {
            display: flex; flex-direction: column; align-items: center;
            margin-top: 60px;
            z-index: 10;
            position: relative;
        }

        .wheel-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.4) 0%, rgba(0, 255, 255, 0.2) 50%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: pulse-glow 3s infinite alternate;
        }
        @keyframes pulse-glow { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } }

        /* --- LA ROUE --- */
        .wheel-wrapper {
            position: relative;
            width: 420px; height: 420px;
            margin: 0 auto;
            z-index: 10;
            /* 🚨 ZOOM PROLONGÉ : 4 secondes de transition douce */
            transition: transform 4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            transform-origin: center center;
        }
        .wheel-wrapper.zoomed { transform: scale(1.4) translateY(20px); z-index: 500; }

        .pointer {
            position: absolute;
            top: -25px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 60px solid #ff1a1a;
            z-index: 30;
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.8));
            transform-origin: top center;
        }
        @keyframes tick { 0% { transform: translateX(-50%) rotate(0deg); } 50% { transform: translateX(-50%) rotate(-18deg); } 100% { transform: translateX(-50%) rotate(0deg); } }
        .pointer.ticking { animation: tick 0.1s infinite; }

        .wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 12px solid #222;
            box-shadow: 0 0 0 6px var(--uv-blue), 0 20px 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
            /* 🚨 RALENTISSEMENT PROLONGÉ : 10 secondes avec une courbe de freinage très longue (bezier modifié) */
            transition: transform 10s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: radial-gradient(circle, #fff 0%, #888 70%, #333 100%);
            border-radius: 50%;
            border: 5px solid #111;
            z-index: 15;
            box-shadow: 0 0 20px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.8);
        }

        .wheel-text {
            position: absolute;
            top: 50%; left: 50%;
            width: 50%; height: 40px;
            margin-top: -20px;
            transform-origin: 0 50%;
            text-align: right;
            padding-right: 45px;
            box-sizing: border-box;
            font-weight: 900;
            font-size: 16px;
            color: #111;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
            line-height: 40px;
        }

        .peg {
            position: absolute;
            top: 50%; left: 50%;
            width: 14px; height: 14px;
            margin-top: -7px; margin-left: -7px;
            background: radial-gradient(circle, #fff, #bbb);
            border-radius: 50%;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.8), inset -2px -2px 4px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .wheel-stand-pillar {
            width: 80px; height: 60px;
            background: linear-gradient(to right, #222, #444, #222);
            margin: -10px auto 0;
            position: relative; z-index: 5;
            border-left: 2px solid #555; border-right: 2px solid #111;
            box-shadow: inset 0 20px 20px rgba(0,0,0,0.8);
        }
        .wheel-stand-base {
            width: 300px; height: 30px;
            background: linear-gradient(to bottom, #333, #111);
            border-radius: 15px 15px 5px 5px;
            margin: 0 auto;
            position: relative; z-index: 4;
            border-bottom: 4px solid var(--brand);
            box-shadow: 0 15px 30px rgba(0,0,0,0.9), 0 0 20px rgba(255,0,127,0.3);
        }

        .btn-arcade {
            background: linear-gradient(to bottom, var(--success), #22990b);
            color: #000; font-size: 28px;
            padding: 20px 60px; border-radius: 50px; border: none;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 0 #155d07, 0 15px 30px rgba(0,0,0,0.8), 0 0 40px rgba(57, 255, 20, 0.4);
            transition: 0.2s; margin-top: 50px; z-index: 20; position: relative;
            letter-spacing: 1px;
        }
        .btn-arcade:hover { filter: brightness(1.2); box-shadow: 0 10px 0 #155d07, 0 15px 30px rgba(0,0,0,0.8), 0 0 60px rgba(57, 255, 20, 0.8); transform: translateY(-2px); }
        .btn-arcade:active { transform: translateY(8px); box-shadow: 0 2px 0 #155d07, 0 5px 10px rgba(0,0,0,0.8), 0 0 20px rgba(57, 255, 20, 0.6); }

        .winner-banner {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #150030 0%, #0a001a 100%);
            color: #fff; padding: 40px 60px; border-radius: 25px;
            border: 4px solid var(--uv-blue);
            box-shadow: 0 0 80px var(--uv-blue), inset 0 0 40px rgba(0, 255, 255, 0.2), 0 30px 60px rgba(0,0,0,0.9);
            text-align: center; z-index: 1000;
            animation: popTicket 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .winner-banner::before {
            content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px dashed var(--brand); border-radius: 30px; pointer-events: none; opacity: 0.5;
        }
        .winner-banner h3 { font-size: 22px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; }
        .winner-banner h1 { font-size: 60px; color: var(--success); font-weight: 900; margin: 0; line-height: 1.1; text-transform: uppercase; text-shadow: 0 0 20px rgba(57,255,20,0.5), 3px 3px 0 #000; }
        
        @keyframes popTicket { 0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; } }
        #empty-msg { color: #ff4d4d; font-weight: bold; font-size: 20px; display: none; margin-top: 20px; text-shadow: 0 0 10px red; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; z-index: 20; }
    </style>
</head>
<body>
    <div class="fullscreen-bg"></div>

    <div class="header-v2">
        <div style="width:30px;"></div>
        <div class="header-title neon-text" style="font-size: 24px;">TIRAGE AU SORT 🎰</div>
        <div class="hamburger-btn" id="admin-menu-btn" onclick="toggleMenu()" style="display:none; font-size:25px; cursor:pointer;">☰</div>
    </div>
    
    <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <button class="close-menu" onclick="toggleMenu()">×</button>
        <a href="scan.html">📷 Scanner QR Code</a>
        <a href="stats.html">📊 Statistiques</a>
        <a href="tirage.html" style="color: var(--brand) !important;">🎰 Tirage au sort</a>
        <div style="margin-top: auto; margin-bottom: 20px;">
            <a href="#" onclick="logout()" style="border-top: 1px solid var(--glass-border); border-bottom: none; font-size: 14px; margin-top: 20px; color: #ff4d4d !important;">🚪 Déconnexion</a>
        </div>
    </div>

    <div class="main-container">
        <div class="wheel-glow" id="wheel-glow"></div>
        <div class="wheel-wrapper" id="wheel-wrapper">
            <div class="pointer" id="wheel-pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="wheel-center"></div>
        </div>
        <div class="wheel-stand-pillar"></div>
        <div class="wheel-stand-base"></div>
        <button class="btn-arcade" id="btn-action" onclick="lancerRoulette()">LANCER LA ROUE</button>
        <p id="empty-msg">🚨 Aucun participant inscrit pour le moment !</p>
        <div class="winner-banner" id="winner-banner">
            <h3>Le grand gagnant est</h3>
            <h1 id="winner-name-display">NOM</h1>
            <button class="btn-group-select" style="margin-top: 30px; font-size: 18px; padding: 15px;" onclick="window.location.reload()">🔄 Refaire un tirage</button>
        </div>
    </div>

    <script>
        const token = sessionStorage.getItem('centurioStatsToken');
        if (!token) window.location.href = "index.html";
        if (sessionStorage.getItem('centurioAdminRole') === 'admin+') {
            document.getElementById('admin-menu-btn').style.display = 'block';
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); document.getElementById('menu-overlay').classList.toggle('open'); }
        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }

        const sliceColors = ['#FF0055', '#00DDFF', '#FFDD00', '#39FF14', '#9D00FF', '#FF6600'];
        
        const initWheel = document.getElementById('wheel');
        let initGradients = [];
        for(let i=0; i<16; i++) {
            let start = i * (360/16); let end = (i+1) * (360/16);
            initGradients.push(`${sliceColors[i%sliceColors.length]} ${start}deg ${end}deg`);
        }
        initWheel.style.background = `conic-gradient(${initGradients.join(', ')})`;
        for(let i=0; i<16; i++) {
            let peg = document.createElement('div');
            peg.className = 'peg';
            peg.style.transform = `rotate(${i * (360 / 16)}deg) translateX(195px)`;
            initWheel.appendChild(peg);
        }

        function lancerRoulette() {
            const btn = document.getElementById('btn-action');
            const emptyMsg = document.getElementById('empty-msg');
            const wheel = document.getElementById('wheel');
            const pointer = document.getElementById('wheel-pointer');
            
            btn.style.display = 'none';

            fetch('/api/tirage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: token }) })
            .then(res => res.json())
            .then(data => {
                if (!data.success) {
                    btn.style.display = 'inline-block';
                    emptyMsg.style.display = 'block';
                    setTimeout(() => emptyMsg.style.display = 'none', 3000);
                    return;
                }

                const N = 16; 
                let participants = [];
                for(let i = 0; i < N - 1; i++) participants.push(data.fauxNoms[i % data.fauxNoms.length]);
                const winnerFullName = `${data.winner.prenom} ${data.winner.nom.charAt(0).toUpperCase()}.`;
                participants.push(winnerFullName);
                participants = participants.sort(() => 0.5 - Math.random()); 
                const winnerIndex = participants.indexOf(winnerFullName);

                let gradientParts = [];
                for(let i = 0; i < N; i++) {
                    let startAngle = i * (360 / N); let endAngle = (i + 1) * (360 / N);
                    gradientParts.push(`${sliceColors[i % sliceColors.length]} ${startAngle}deg ${endAngle}deg`);
                }
                wheel.style.background = `conic-gradient(${gradientParts.join(', ')})`;

                wheel.innerHTML = '';
                for(let i = 0; i < N; i++) {
                    let textAngle = i * (360 / N) + (360 / N) / 2;
                    let textSpan = document.createElement('div');
                    textSpan.className = 'wheel-text';
                    textSpan.style.transform = `rotate(${textAngle}deg)`;
                    textSpan.innerText = participants[i].length > 12 ? participants[i].substring(0, 10) + '...' : participants[i];
                    wheel.appendChild(textSpan);
                    let peg = document.createElement('div');
                    peg.className = 'peg';
                    peg.style.transform = `rotate(${i * (360 / N)}deg) translateX(195px)`;
                    wheel.appendChild(peg);
                }

                // 🚨 CALCUL POUR 10 SECONDES (10 tours)
                const anglePerSlice = 360 / N;
                const targetAngle = winnerIndex * anglePerSlice + (anglePerSlice / 2);
                const totalRotation = (360 * 10) - 90 - targetAngle;

                void wheel.offsetWidth; 

                wheel.style.transform = `rotate(${totalRotation}deg)`;
                pointer.classList.add('ticking'); 
                document.getElementById('wheel-glow').style.animationDuration = "0.4s";

                // 🚨 DÉCLENCHEMENT DU ZOOM À LA 6ème SECONDE (pendant le ralentissement)
                setTimeout(() => {
                    document.getElementById('wheel-wrapper').classList.add('zoomed');
                }, 6000);

                // 🚨 RÉVÉLATION À LA 10ème SECONDE
                setTimeout(() => {
                    pointer.classList.remove('ticking'); 
                    document.getElementById('wheel-glow').style.animationDuration = "3s";
                    
                    setTimeout(() => {
                        document.getElementById('winner-name-display').innerText = winnerFullName;
                        document.getElementById('winner-banner').style.display = 'block';

                        const fluoColors = ['#FF007F', '#39FF14', '#00FFFF', '#FFFF00', '#FF00FF'];
                        confetti({ particleCount: 1500, spread: 360, startVelocity: 90, scalar: 1.5, colors: fluoColors, zIndex: 9999 });
                        setTimeout(() => confetti({ particleCount: 800, spread: 360, startVelocity: 70, colors: fluoColors, zIndex: 9999 }), 800);
                    }, 500); 
                    
                }, 10000); 
            });
        }
    </script>
</body>
</html>
